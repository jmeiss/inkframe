services:
  inkframe:
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
    container_name: inkframe
    restart: unless-stopped
    networks:
      - caddy
    environment:
      # Required
      - GOOGLE_PHOTOS_ALBUM_URL=${GOOGLE_PHOTOS_ALBUM_URL}
      - PATH_SECRET=${PATH_SECRET}

      # Image selection (optional)
      - TIME_BUCKETS=${TIME_BUCKETS:-}
      - HISTORY_SIZE=${HISTORY_SIZE:-20}

      # Server (optional)
      - PORT=3000
      - HOST=0.0.0.0

      # Cache (optional)
      - ALBUM_REFRESH_INTERVAL_MINUTES=${ALBUM_REFRESH_INTERVAL_MINUTES:-60}
      - IMAGE_CACHE_ENABLED=${IMAGE_CACHE_ENABLED:-true}

      # Processing (optional)
      - DITHER_ENABLED=${DITHER_ENABLED:-true}
      - OUTPUT_FORMAT=${OUTPUT_FORMAT:-png}

      # Logging (optional)
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  caddy:
    external: true
    name: caddy_default
